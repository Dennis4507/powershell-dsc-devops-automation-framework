name: Validate DSC Framework

# Runs automatically on every push and every pull request targeting main -
# nobody has to remember to run tests or the linter by hand before merging.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    # DSC only works on Windows, so this needs a real Windows runner, not
    # the more common Linux ones most GitHub Actions jobs use.
    runs-on: windows-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: powershell
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Install PSScriptAnalyzer
        shell: powershell
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run the Pester test suite
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.0 -Force
          $result = Invoke-Pester -Path .\windows\ControlPlane.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) Pester test(s) failed."
          }

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          $results = Invoke-ScriptAnalyzer -Path .\windows -Recurse -Severity Warning,Error
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }

      - name: Confirm ControlPlane.ps1 still compiles into a valid MOF
        shell: powershell
        run: |
          . .\windows\ControlPlane.ps1
          $configData = Import-PowerShellDataFile -Path .\windows\ControlPlane.config.psd1
          ControlPlane -ConfigurationData $configData -OutputPath .\MOF-CI | Out-Null
          if (-not (Test-Path .\MOF-CI\localhost.mof)) {
            throw "ControlPlane.ps1 did not produce a MOF file."
          }
