# inventory.example.ini
#
# An example of how to tell Ansible which machine to connect to, and how.
# Copy this file to inventory.ini (that name is already in .gitignore-style
# thinking - never commit a real inventory file with real credentials in
# it), then fill in the real values.
#
# The IP address below would normally come straight from Terraform's own
# output - see azure/outputs.tf, the vm_public_ip value, once
# azure/main.tf has actually been applied.
#
# SECURITY: never put a real password directly in this file for anything
# beyond local testing. For real use, pass credentials in at run time
# instead, for example with --ask-pass, or better, use a proper secret
# store and Ansible Vault to encrypt them.

[control_plane_vm]
<vm_public_ip_here> ansible_user=<admin_username> ansible_password=<admin_password>

[control_plane_vm:vars]
ansible_connection=winrm
ansible_winrm_transport=basic
ansible_winrm_server_cert_validation=ignore
ansible_port=5986
